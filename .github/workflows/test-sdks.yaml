name: Test Published SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to test (e.g. 0.1.16)"
        required: true
        default: "0.1.36"
  repository_dispatch:
    types: [test-sdks]
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 08:00 UTC

env:
  SDK_VERSION: ${{ github.event.inputs.version || github.event.client_payload.version || '0.1.36' }}
  PULUMI_BACKEND_URL: "file://~"
  PULUMI_CONFIG_PASSPHRASE: "test"

jobs:
  python:
    name: "Python SDK"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: pip install "rpothin-powerplatform==${{ env.SDK_VERSION }}"

      - name: Verify import
        run: python -c "import rpothin_powerplatform; print('Import OK')"

      - name: Compile check
        run: python -m py_compile __main__.py

      - name: Set up Pulumi venv
        run: |
          python -m venv .venv
          .venv/bin/pip install "rpothin-powerplatform==${{ env.SDK_VERSION }}"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Preview (optional)
        if: env.AZURE_CLIENT_ID != ''
        run: |
          set -o pipefail
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev --logtostderr -v=9 2>&1 | tail -200

  python-e2e:
    name: "Python SDK E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: pip install "rpothin-powerplatform==${{ env.SDK_VERSION }}"

      - name: Set up Pulumi venv
        run: |
          python -m venv .venv
          .venv/bin/pip install "rpothin-powerplatform==${{ env.SDK_VERSION }}"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Stack init
        if: env.AZURE_CLIENT_ID != ''
        run: pulumi stack init "e2e-${{ github.run_id }}" --non-interactive

      - name: Copy stack config
        if: env.AZURE_CLIENT_ID != ''
        run: cp Pulumi.e2e.yaml "Pulumi.e2e-${{ github.run_id }}.yaml"

      - name: pulumi up
        if: env.AZURE_CLIENT_ID != ''
        run: |
          set -o pipefail
          pulumi up --yes --non-interactive --stack "e2e-${{ github.run_id }}" --logtostderr -v=9 2>&1 | tail -300

      - name: Validate outputs
        if: env.AZURE_CLIENT_ID != ''
        run: |
          python - << 'EOF'
          import json, subprocess, sys
          out = json.loads(subprocess.check_output(
              ["pulumi", "stack", "output", "--json", "--stack", "e2e-${{ github.run_id }}"],
              text=True
          ))
          errors = []
          if not out.get("envId"):
              errors.append("envId is empty")
          valid_env_states = {"Ready", "Enabled", "Succeeded"}
          if out.get("envState") not in valid_env_states:
              errors.append(f"envState is '{out.get('envState')}', expected one of {sorted(valid_env_states)}")
          if out.get("envType") != "Sandbox":
              errors.append(f"envType is '{out.get('envType')}', expected 'Sandbox'")
          if out.get("envLocation") != "unitedstates":
              errors.append(f"envLocation is '{out.get('envLocation')}', expected 'unitedstates'")
          if errors:
              for e in errors:
                  print(f"FAIL: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"PASS: envId={out['envId']}, state={out['envState']}, type={out['envType']}, location={out['envLocation']}")
          EOF

      - name: pulumi refresh
        if: env.AZURE_CLIENT_ID != ''
        run: pulumi refresh --yes --non-interactive --stack "e2e-${{ github.run_id }}"

      - name: Destroy
        if: always() && env.AZURE_CLIENT_ID != ''
        run: pulumi destroy --yes --non-interactive --stack "e2e-${{ github.run_id }}"

      - name: Stack rm
        if: always() && env.AZURE_CLIENT_ID != ''
        run: pulumi stack rm "e2e-${{ github.run_id }}" --yes --non-interactive

  typescript:
    name: "TypeScript SDK"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install "@rpothin/powerplatform@${{ env.SDK_VERSION }}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Verify runtime import
        run: node -e "const pp = require('@rpothin/powerplatform'); console.log('Runtime import OK:', Object.keys(pp).length, 'exports')"

      - name: Set up Python (for provider plugin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Preview (optional)
        if: env.AZURE_CLIENT_ID != ''
        run: |
          set -o pipefail
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev --logtostderr -v=9 2>&1 | tail -200

  dotnet:
    name: ".NET SDK"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Wait for NuGet propagation
        shell: bash
        run: |
          VERSION="${{ env.SDK_VERSION }}"
          INDEX_URL="https://api.nuget.org/v3-flatcontainer/rpothin.powerplatform/index.json"
          MAX_RETRIES=20
          RETRY_INTERVAL=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: checking NuGet for version $VERSION..."
            if curl -sf "$INDEX_URL" | grep -q "\"${VERSION}\""; then
              echo "Version $VERSION is available on NuGet."
              exit 0
            fi
            echo "Not yet available. Waiting ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Timed out waiting for version $VERSION on NuGet."
          exit 1

      - name: Install SDK and restore
        run: |
          dotnet add package Rpothin.Powerplatform --version "${{ env.SDK_VERSION }}"
          dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Set up Python (for provider plugin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Preview (optional)
        if: env.AZURE_CLIENT_ID != ''
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev

  go:
    name: "Go SDK"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Update SDK version
        run: go get github.com/rpothin/pulumi-powerplatform/sdk/go/powerplatform@v${{ env.SDK_VERSION }}

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -o /dev/null .

      - name: Set up Python (for provider plugin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Preview (optional)
        if: env.AZURE_CLIENT_ID != ''
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev

  java:
    name: "Java SDK"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - uses: gradle/actions/setup-gradle@v4

      - name: Wait for Maven Central propagation
        shell: bash
        run: |
          VERSION="${{ env.SDK_VERSION }}"
          METADATA_URL="https://repo1.maven.org/maven2/io/github/rpothin/powerplatform/maven-metadata.xml"
          MAX_RETRIES=20
          RETRY_INTERVAL=30
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: checking Maven Central for version $VERSION..."
            if curl -sf "$METADATA_URL" | grep -q "<version>${VERSION}</version>"; then
              echo "Version $VERSION is available on Maven Central."
              exit 0
            fi
            echo "Not yet available. Waiting ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Timed out waiting for version $VERSION on Maven Central."
          exit 1

      - name: Build
        run: ./gradlew build --stacktrace -PsdkVersion="${{ env.SDK_VERSION }}"

      - name: Set up Python (for provider plugin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Azure login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Preview (optional)
        if: env.AZURE_CLIENT_ID != ''
        env:
          ORG_GRADLE_PROJECT_sdkVersion: ${{ env.SDK_VERSION }}
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev


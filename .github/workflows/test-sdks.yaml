name: Test Published SDKs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to test (e.g. 0.1.16)"
        required: true
        default: "0.1.16"
  repository_dispatch:
    types: [test-sdks]
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 08:00 UTC

env:
  SDK_VERSION: ${{ github.event.inputs.version || github.event.client_payload.version || '0.1.16' }}
  PULUMI_BACKEND_URL: "file://~"
  PULUMI_CONFIG_PASSPHRASE: "test"

jobs:
  python:
    name: "Python SDK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK
        run: pip install "rpothin-powerplatform==${{ env.SDK_VERSION }}"

      - name: Verify import
        run: python -c "import rpothin_powerplatform; print('Import OK')"

      - name: Compile check
        run: python -m py_compile __main__.py

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Preview (optional)
        if: env.POWER_PLATFORM_CLIENT_ID != ''
        env:
          POWER_PLATFORM_CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          POWER_PLATFORM_CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          POWER_PLATFORM_TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev

  typescript:
    name: "TypeScript SDK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          npm install "@rpothin/powerplatform@${{ env.SDK_VERSION }}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Preview (optional)
        if: env.POWER_PLATFORM_CLIENT_ID != ''
        env:
          POWER_PLATFORM_CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          POWER_PLATFORM_CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          POWER_PLATFORM_TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev

  dotnet:
    name: ".NET SDK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install SDK and restore
        run: |
          dotnet add package Rpothin.Powerplatform --version "${{ env.SDK_VERSION }}"
          dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

      - name: Preview (optional)
        if: env.POWER_PLATFORM_CLIENT_ID != ''
        env:
          POWER_PLATFORM_CLIENT_ID: ${{ secrets.POWER_PLATFORM_CLIENT_ID }}
          POWER_PLATFORM_CLIENT_SECRET: ${{ secrets.POWER_PLATFORM_CLIENT_SECRET }}
          POWER_PLATFORM_TENANT_ID: ${{ secrets.POWER_PLATFORM_TENANT_ID }}
        run: |
          pulumi stack init dev --non-interactive
          pulumi preview --non-interactive --stack dev

  go:
    name: "Go SDK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Check module availability
        id: check
        run: |
          if go list -m "github.com/rpothin/pulumi-powerplatform/sdk/go/powerplatform@v${{ env.SDK_VERSION }}" 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Go module not available at v${{ env.SDK_VERSION }} — skipping build"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dependencies
        if: steps.check.outputs.available == 'true'
        run: go mod tidy

      - name: Build
        if: steps.check.outputs.available == 'true'
        run: go build -o /dev/null .

      - name: Install Pulumi CLI
        if: steps.check.outputs.available == 'true'
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        if: steps.check.outputs.available == 'true'
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"

  java:
    name: "Java SDK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - uses: gradle/actions/setup-gradle@v4

      - name: Check artifact availability
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://repo1.maven.org/maven2/io/github/rpothin/powerplatform/${{ env.SDK_VERSION }}/powerplatform-${{ env.SDK_VERSION }}.pom")
          if [ "$STATUS" = "200" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Java artifact not available on Maven Central (HTTP $STATUS) — skipping build"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.check.outputs.available == 'true'
        run: gradle compileJava -PsdkVersion="${{ env.SDK_VERSION }}"

      - name: Install Pulumi CLI
        if: steps.check.outputs.available == 'true'
        uses: pulumi/actions@v6
        with:
          pulumi-version: "latest"

      - name: Install provider plugin
        if: steps.check.outputs.available == 'true'
        run: pulumi plugin install resource powerplatform "v${{ env.SDK_VERSION }}" --server "github://api.github.com/rpothin"
